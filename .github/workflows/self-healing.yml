name: Self-Healing CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Build
        id: build
        continue-on-error: true
        run: npm install && npm run build 2> error.log

      - name: Self-Heal on Failure
        if: steps.build.outcome == 'failure'
        run: |
          echo "Build failed! Capturing logs and sending to n8n self-healing agent..."
          
          # Clean up error log and convert to JSON string
          ERROR_LOG=$(cat error.log | jq -Rs .)
          
          N8N_WEBHOOK_URL="${{ secrets.N8N_WEBHOOK_URL }}"
          
          curl -X POST $N8N_WEBHOOK_URL \
               -H "Content-Type: application/json" \
               -d "{
                     \"repository\": \"${{ github.repository }}\",
                     \"branch\": \"${{ github.ref_name }}\",
                     \"file_to_fix\": \"package.json\",
                     \"error_log\": $ERROR_LOG
                   }"
          
          # Exit with error so the CI run is still marked as failed
          exit 1
