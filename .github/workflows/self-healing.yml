name: Self-Healing CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Build
        id: build
        continue-on-error: true
        run: npm install && npm run build 2> error.log

      - name: Self-Heal on Failure
        if: always() && steps.build.outcome == 'failure'
        run: |
          echo "Build failed detected. Starting Self-Heal sequence..."
          
          if [ -z "${{ secrets.N8N_WEBHOOK_URL }}" ]; then
            echo "ERROR: N8N_WEBHOOK_URL secret is not set in GitHub!"
            exit 1
          fi

          echo "Capturing error.log..."
          ERROR_LOG=$(cat error.log | jq -Rs .)
          
          echo "Sending POST request to n8n..."
          curl -v -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
               -H "Content-Type: application/json" \
               -d "{
                     \"repository\": \"${{ github.repository }}\",
                     \"branch\": \"${{ github.ref_name }}\",
                     \"file_to_fix\": \"package.json\",
                     \"error_log\": $ERROR_LOG
                   }"
          
          echo "Self-heal webhook sent."
          exit 1
